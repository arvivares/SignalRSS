x-app-hardening: &app-hardening
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-category-impact-worker-base: &category-impact-worker-base
  <<: *app-hardening
  build: .
  environment: &category-impact-worker-env
    <<: [*db-env, *llm-env, *langfuse-env]
    EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    IMPACT_MODEL: ${IMPACT_MODEL:-gpt-5-nano}
    IMPACT_RUBRIC_VERSION: ${IMPACT_RUBRIC_VERSION:-impact-v2}
    IMPACT_CATEGORY_GUIDANCE_JSON: ${IMPACT_CATEGORY_GUIDANCE_JSON:-}
    IMPACT_MAX_OUTPUT_TOKENS: ${IMPACT_MAX_OUTPUT_TOKENS:-2200}
    IMPACT_LOCAL_MAX_OUTPUT_TOKENS: ${IMPACT_LOCAL_MAX_OUTPUT_TOKENS:-1200}
    IMPACT_MODEL_FALLBACKS: ${IMPACT_MODEL_FALLBACKS:-vllm:qwen3:4b-instruct-vllm,mistral:mistral-small-latest,nvidia:openai/gpt-oss-120b,cerebras:gpt-oss-120b,cerebras:zai-glm-4.7,openrouter:nvidia/nemotron-3-super-120b-a12b:free,groq:openai/gpt-oss-120b,groq:openai/gpt-oss-20b,groq:llama-3.3-70b-versatile,openai:gpt-5-nano}
    IMPACT_BATCH_SIZE: ${CATEGORY_IMPACT_BATCH_SIZE:-4}
    IMPACT_BATCHES_PER_TICK: ${CATEGORY_IMPACT_BATCHES_PER_TICK:-5}
    CATEGORY_IMPACT_CATEGORIES_PER_TICK: ${CATEGORY_IMPACT_CATEGORIES_PER_TICK:-3}
    IMPACT_POLL_INTERVAL_SECONDS: ${CATEGORY_IMPACT_POLL_INTERVAL_SECONDS:-60}
    IMPACT_WINDOW_HOURS: ${IMPACT_WINDOW_HOURS:-168}
    IMPACT_WINDOW_HOURS_BY_CATEGORY: ${IMPACT_WINDOW_HOURS_BY_CATEGORY:-}
    IMPACT_MAX_CLUSTER_AGE_HOURS: ${IMPACT_MAX_CLUSTER_AGE_HOURS:-0}
    IMPACT_MAX_CLUSTER_AGE_HOURS_BY_CATEGORY: ${IMPACT_MAX_CLUSTER_AGE_HOURS_BY_CATEGORY:-}
    IMPACT_MIN_PUBLISHED_AT: ${IMPACT_MIN_PUBLISHED_AT:-}
    IMPACT_JOB_STALE_MINUTES: ${IMPACT_JOB_STALE_MINUTES:-30}
    IMPACT_JOB_RETRY_MINUTES: ${IMPACT_JOB_RETRY_MINUTES:-10}
    IMPACT_JOB_MAX_ATTEMPTS: ${IMPACT_JOB_MAX_ATTEMPTS:-5}
    IMPACT_RUN_STALE_MINUTES: ${IMPACT_RUN_STALE_MINUTES:-30}
    CATEGORY_WORKER_INCLUDE_SLUGS: ${CATEGORY_WORKER_INCLUDE_SLUGS:-}
    CATEGORY_WORKER_EXCLUDE_SLUGS: ${CATEGORY_WORKER_EXCLUDE_SLUGS:-}
    CATEGORY_BRIEFING_EXCLUDE_LEVELS: ${CATEGORY_BRIEFING_EXCLUDE_LEVELS:-consumer-electronics:P2,consumer-electronics:P3}
  command: ["npm", "run", "category-impact:worker"]
  depends_on:
    postgres:
      condition: service_healthy
    migrator:
      condition: service_completed_successfully
    category-seeder:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg18
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=all"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signalrss}
      POSTGRES_USER: ${POSTGRES_USER:-signalrss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalrss}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:5432:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalrss} -d ${POSTGRES_DB:-signalrss}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://signalrss:signalrss@postgres:5432/signalrss}
    command: ["npm", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seeder:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://signalrss:signalrss@postgres:5432/signalrss}
    command: ["npm", "run", "seed:feeds"]
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: "no"

  category-seeder:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://signalrss:signalrss@postgres:5432/signalrss}
    command: ["npm", "run", "seed:categories"]
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: "no"

  backfill:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://signalrss:signalrss@postgres:5432/signalrss}
      INGEST_WINDOW_DAYS: ${INGEST_WINDOW_DAYS:-7}
      FEED_MAX_BYTES: ${FEED_MAX_BYTES:-10485760}
      BACKFILL_CONCURRENCY: ${BACKFILL_CONCURRENCY:-8}
    command: ["npm", "run", "backfill:7d"]
    profiles:
      - jobs
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      seeder:
        condition: service_completed_successfully
    restart: "no"

